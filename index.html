<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Secret Elevator</title><style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden}
#elevator{width:320px;height:520px;border:4px solid #666;border-radius:14px;background:#1e293b;position:relative}
#scene{height:430px;display:flex;justify-content:center;align-items:center;font-size:90px}
#panel{height:90px;border-top:2px solid #555;text-align:center;padding-top:10px}
button{padding:10px 24px;font-size:22px}
#doors{position:absolute;top:0;left:0;width:100%;height:430px;pointer-events:none}
.door{position:absolute;top:0;width:50%;height:100%;background:#475569;transition:1s}
.left{left:0}.right{right:0}.openL{transform:translateX(-100%)}.openR{transform:translateX(100%)}
#final{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#111827,#312e81);justify-content:center;align-items:center;flex-direction:column;font-size:56px;text-align:center}
small{font-size:24px}
</style></head><body>
<div id="elevator"><div id="scene">🏢</div><div id="doors"><div class="door left"></div><div class="door right"></div></div><div id="panel"><div id="msg">Floor 0 — Press ▲</div><button id="btn">▲</button></div></div>
<div id="final"><div>🎉 Happy Birthday<br>Arshia 🎂</div><small>Hope every new floor this year brings a new adventure.</small></div>
<script>
const scenes=[["🌊","Floor 1 — Ocean"],["🚀","Floor 2 — Space"],["🌸","Floor 3 — Clouds"],["🎈","Floor 4 — Balloons"],["✨","Penthouse"]];
let i=-1;
btn.onclick=()=>{i++;if(i>=scenes.length){elevator.style.display="none";final.style.display="flex";return;}
msg.textContent="Moving...";btn.disabled=true;
document.querySelector(".left").classList.remove("openL");document.querySelector(".right").classList.remove("openR");
setTimeout(()=>{scene.textContent=scenes[i][0];msg.textContent=scenes[i][1];
document.querySelector(".left").classList.add("openL");document.querySelector(".right").classList.add("openR");btn.disabled=false;},800);}
</script></body></html>
